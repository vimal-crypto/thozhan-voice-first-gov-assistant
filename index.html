<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thozhan AI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;500;700&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            /* Gemini Dark */
            --sidebar-bg: #1e1f20;
            --chat-bg: #131314;
            --input-bg: #282a2c;
            --primary: #a8c7fa;
            /* Google Blueish */
            --text-main: #e3e3e3;
            --text-sub: #c4c7c5;
            --accent: #d3e3fd;
            --user-bubble: #282a2c;
            --bot-bubble: #004a77;
            /* Slight blue tint */
        }

        body {
            font-family: 'Outfit', 'Mukta Malar', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar (History/Context) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #444746;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item {
            padding: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-sub);
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background-color: #333537;
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 100px;
            /* Compress width like Gemini */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Messages */
        .message-row {
            display: flex;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #444746;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        .user .avatar {
            background: #5e5e5e;
        }

        .bot .avatar {
            background: linear-gradient(135deg, #4285f4, #d96570);
        }

        .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 1rem;
        }

        .user .bubble {
            background-color: var(--input-bg);
            color: var(--text-main);
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: transparent;
            /* Gemini style often has no bubble for AI, just text, or very subtle */
            padding-left: 0;
        }

        /* Input Area (Bottom) */
        .input-area {
            padding: 20px;
            display: flex;
            justify-content: center;
            background: var(--bg-color);
        }

        .input-bar {
            background-color: var(--input-bg);
            border-radius: 40px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            width: 60%;
            max-width: 800px;
            gap: 15px;
            border: 1px solid #444746;
        }

        #status-text {
            flex: 1;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        #micBtn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--text-main);
            color: var(--bg-color);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #micBtn:hover {
            transform: scale(1.05);
        }

        #micBtn.recording {
            background: #e74c3c;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(231, 76, 60, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">
            ✨ Thozhan
        </div>
        <div class="history-item">New Chat</div>
        <div class="history-item">Recent: Magalir Urimai</div>
    </div>

    <div class="main-content">
        <div id="chat-container">
            <!-- Intro -->
            <div style="text-align: center; margin-top: 50px; margin-bottom: 50px;">
                <h1
                    style="font-size: 3rem; background: linear-gradient(to right, #4285f4, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;">
                    Hello, Vimal</h1>
                <p style="color: #444746; font-size: 1.2rem;">How can I help you in Tamil today?</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-bar">
                <div id="status-text">Tap the microphone to speak...</div>
                <button id="micBtn">🎤</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.rawgit.com/mattdiamond/Recorderjs/08e7abd9/dist/recorder.js"></script>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('status-text');
        let audioContext, recorder, isRecording = false;

        // Welcome Audio on Load
        // Note: Browsers block auto-play audio without interaction. 
        // We can't force it easily on load, but we can display the text.

        function addMessage(text, isUser) {
            const row = document.createElement('div');
            row.className = `message-row ${isUser ? 'user' : 'bot'}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? 'You' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = text; // Allow bolding

            row.appendChild(avatar);
            row.appendChild(bubble);

            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        micBtn.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const input = audioContext.createMediaStreamSource(stream);
                recorder = new Recorder(input, { numChannels: 1 });
                recorder.record();

                isRecording = true;
                micBtn.classList.add('recording');
                statusText.textContent = "Listening...";
            } catch (err) {
                alert("No Mic Access");
            }
        }

        function stopRecording() {
            recorder.stop();
            isRecording = false;
            micBtn.classList.remove('recording');
            statusText.textContent = "Processing...";

            recorder.exportWAV(sendToServer);
        }

        async function sendToServer(blob) {
            const formData = new FormData();
            formData.append("file", blob, "recording.wav");

            try {
                const response = await fetch("/chat/audio", { method: "POST", body: formData });
                statusText.textContent = "Tap to speak...";

                if (!response.ok) throw new Error("Error");

                const data = await response.json();

                addMessage(data.user_text, true);

                // Format Agent Text (If keyword present, make it bold or show searching)
                let agentResponse = data.agent_text;
                if (agentResponse.includes("online")) {
                    agentResponse = `<i>🔍 Searching Web...</i><br/><br/>` + agentResponse;
                }

                addMessage(agentResponse, false);

                const audio = new Audio(data.audio_url);
                audio.play();

            } catch (err) {
                statusText.textContent = "Error occurred.";
                console.error(err);
            }
        }
    </script>

</body>

</html>
